<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luum — Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var s = localStorage.getItem('luum-theme');
  var t = (s === 'dark' || s === 'light') ? s : 'light';
  if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:  #F5F5F5;
  --sur: #FFFFFF;
  --bdr: #E9E8E8;
  --bdr2: #D1D5DB;
  --tx:  #111827;
  --sub: #6B7280;
  --mu:  #9CA3AF;
  --acc: #8361FF;
}
[data-theme="dark"] {
  --bg:  #09090D;
  --sur: #111118;
  --bdr: rgba(255,255,255,0.08);
  --bdr2: rgba(255,255,255,0.14);
  --tx:  #F0EDE8;
  --sub: rgba(240,237,232,0.55);
  --mu:  rgba(240,237,232,0.32);
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Inter', 'Pretendard', -apple-system, sans-serif;
  font-size: 14px;
  color: var(--tx);
  transition: background .2s, color .2s;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  gap: 20px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: var(--sur);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.06);
  padding: 44px 40px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
[data-theme="dark"] .card { box-shadow: 0 1px 4px rgba(0,0,0,.3), 0 4px 24px rgba(0,0,0,.3); }

.logo-wrap { margin-bottom: 24px; }
[data-theme="dark"] .luum-l { fill: #F0EDE8; }
[data-theme="dark"] .luum-m { fill: #F0EDE8; }

.card-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--tx);
  letter-spacing: -.02em;
  margin-bottom: 6px;
  font-family: 'Outfit', 'Pretendard', sans-serif;
}
.card-sub {
  font-size: 13px;
  color: var(--mu);
  margin-bottom: 28px;
  text-align: center;
}

/* OAuth buttons */
.btn-oauth {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 44px;
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--tx);
  cursor: pointer;
  transition: background .12s, border-color .12s;
  margin-bottom: 10px;
}
.btn-oauth:last-of-type { margin-bottom: 0; }
.btn-oauth:hover { background: var(--bg); border-color: var(--bdr2); }

.btn-wrap { width: 100%; margin-bottom: 20px; }

/* divider */
.or-row {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  color: var(--mu);
  font-size: 12px;
}
.or-line { flex: 1; height: 1px; background: var(--bdr); }

/* Sign On text button */
.btn-sign-on {
  background: none; border: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--acc); cursor: pointer;
  margin-bottom: 16px;
  transition: opacity .12s;
}
.btn-sign-on:hover { opacity: .72; }

/* Privacy notice */
.card-notice {
  font-size: 11.5px;
  color: var(--mu);
  text-align: center;
  line-height: 1.6;
  margin-top: 20px;
}
.card-notice a {
  color: var(--acc);
  text-decoration: none;
}
.card-notice a:hover { text-decoration: underline; }

/* Footer */
.page-footer {
  font-size: 11.5px;
  color: var(--mu);
  text-align: center;
}
</style>
</head>
<body>

<div class="card">

  <div class="logo-wrap">
    <svg width="80" height="14" viewBox="0 0 51 9" fill="none" xmlns="http://www.w3.org/2000/svg">

      <path fill="#8361FF" d="M30.249 8.688c-.752 0-1.408-.152-1.968-.456-.56-.312-.996-.74-1.308-1.284-.312-.544-.468-1.168-.468-1.872V0h2.4v5.292c0 .272.06.504.18.696.12.192.28.34.48.444.208.096.436.144.684.144.256 0 .48-.048.672-.144.2-.096.356-.24.468-.424.112-.192.168-.424.168-.692V0h2.412v5.088c0 .704-.156 1.328-.468 1.872-.304.536-.736.96-1.296 1.272-.552.304-1.204.456-1.956.456Z"/>
      <path class="luum-m" fill="#111827" d="M40.987 8.544V0h1.74l3.18 4.656h-.756L48.319 0h1.74v8.544H47.683V3.936l.348.096-1.74 2.496h-1.536L43.027 4.032l.336-.096v4.608H40.987Z"/>
    </svg>
  </div>

  <h1 class="card-title">Sign In</h1>
  <p class="card-sub">Weave your work.</p>

  <div class="btn-wrap">
    <button class="btn-oauth" onclick="location.href='luum-index.html'">

        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.08-6.08C34.56 3.19 29.6 1 24 1 14.72 1 6.86 6.58 3.24 14.44l7.07 5.49C12.08 13.45 17.56 9.5 24 9.5z"/>

    <button class="btn-oauth" onclick="location.href='luum-index.html'">

      </svg>
      Continue with Apple
    </button>
  </div>

  <button class="btn-sign-on" onclick="location.href='luum-index.html'">Sign On</button>

  <p class="card-notice">
    By continuing, you agree to Luum's<br>
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </p>

</div>

<p class="page-footer">© 2026 Edencrew Inc.</p>

</body>
</html>
