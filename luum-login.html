<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luum — Sign in</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #09090D;
    --surface: #111118;
    --border:  #1E1E2A;
    --accent:  #8361FF;
    --ag:      rgba(131,97,255,0.14);
    --text:    #F0EDE8;
    --muted:   rgba(240,237,232,0.36);
    --faint:   rgba(240,237,232,0.10);
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* woven grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(131,97,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(131,97,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(131,97,255,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -60%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -60%) scale(1.08); }
  }

  /* card */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 388px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* wordmark */
  .wordmark {
    margin-bottom: 10px;
    letter-spacing: 0.18em;
    font-size: 58px;
    font-weight: 200;
    color: var(--text);
    line-height: 1;
    user-select: none;
  }

  .wordmark .uu {
    color: var(--accent);
    opacity: 0.9;
  }

  .tagline {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  /* login box */
  .login-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .login-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  /* auth buttons */
  .auth-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 13px 20px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    border: none;
    letter-spacing: -0.01em;
    text-decoration: none;
  }

  .auth-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
  .auth-btn:active { opacity: 1;    transform: translateY(0); }

  .auth-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .btn-google {
    background: #FFFFFF;
    color: #1F1F1F;
  }

  .btn-apple {
    background: #111111;
    color: #F5F5F5;
    border: 1px solid #2A2A2A;
  }

  .btn-icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  /* divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 11px;
    color: var(--faint);
    letter-spacing: 0.06em;
  }

  /* footer */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .footer a {
    color: var(--muted);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .footer a:hover { color: var(--text); }

  @media (prefers-reduced-motion: reduce) {
    body::after { animation: none; }
    .auth-btn:hover { transform: none; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="wordmark">l<span class="uu">uu</span>m</div>
  <div class="tagline">Project workspace</div>

  <div class="login-box">
    <div class="login-title">계속하려면 로그인하세요</div>

    <button class="auth-btn btn-google" onclick="void(0)">
      <span class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9087c1.7018-1.5668 2.6836-3.874 2.6836-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.859-3.0477.859-2.344 0-4.3282-1.5836-5.036-3.7104H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2823-1.71V4.9582H.9573A8.9965 8.9965 0 0 0 0 9c0 1.4514.3477 2.8268.9573 4.0418L3.964 10.71z" fill="#FBBC05"/>
          <path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1632 6.656 3.5795 9 3.5795z" fill="#EA4335"/>
        </svg>
      </span>
      Google로 계속하기
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">또는</div>
      <div class="divider-line"></div>
    </div>

    <button class="auth-btn btn-apple" onclick="void(0)">
      <span class="btn-icon">
        <svg width="17" height="17" viewBox="0 0 814 1000" fill="#F5F5F5" xmlns="http://www.w3.org/2000/svg">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663.3 0 541.8c0-207.5 135.4-317.3 269-317.3 70.5 0 129.5 46.4 173.3 46.4 42 0 108.6-49.3 190.5-49.3zm-109.6-160.7c-36.9 45.3-99.1 79.9-161.3 79.9-8.3 0-10.3-.6-10.3-8.3 0-56.6 43.1-116.7 87.5-150.3C642.5 67.9 705 42 756 42c5.8 0 10.9.6 10.9 7.7 0 56.3-39.2 115.4-78.4 130.5z"/>
        </svg>
      </span>
      Apple로 계속하기
    </button>
  </div>

  <div class="footer">
    로그인하면 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.
  </div>

</div>

</body>
</html>
