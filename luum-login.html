<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luum — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #09090D;
    --surface: #111118;
    --border:  #1E1E2A;
    --accent:  #8361FF;
    --ag:      rgba(131,97,255,0.14);
    --text:    #F0EDE8;
    --muted:   rgba(240,237,232,0.36);
    --faint:   rgba(240,237,232,0.10);
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* woven grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(131,97,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(131,97,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(131,97,255,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -60%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -60%) scale(1.08); }
  }

  /* card */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 388px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* wordmark */
  .wordmark {
    margin-bottom: 10px;
    letter-spacing: 0.12em;
    font-size: 58px;
    font-weight: 200;
    font-family: 'Outfit', -apple-system, sans-serif;
    color: var(--text);
    line-height: 1;
    user-select: none;
  }

  .wordmark .uu {
    color: var(--accent);
    opacity: 0.9;
  }

  .tagline {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 20px;
    margin-bottom: 48px;
  }

  .sign-on {
    width: 100%;
    padding: 13px 20px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  .sign-on:hover  { opacity: 0.88; transform: translateY(-1px); }
  .sign-on:active { opacity: 1; transform: translateY(0); }
  .sign-on:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .copyright {
    margin-top: 40px;
    font-size: 11px;
    color: rgba(240,237,232,0.18);
    letter-spacing: 0.04em;
  }

  /* login box */
  .login-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .login-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  /* auth buttons */
  .auth-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 13px 20px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    border: none;
    letter-spacing: -0.01em;
    text-decoration: none;
  }

  .auth-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
  .auth-btn:active { opacity: 1;    transform: translateY(0); }

  .auth-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .btn-google {
    background: #FFFFFF;
    color: #1F1F1F;
  }

  .btn-apple {
    background: #111111;
    color: #F5F5F5;
    border: 1px solid #2A2A2A;
  }

  .btn-icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  /* divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 11px;
    color: var(--faint);
    letter-spacing: 0.06em;
  }

  /* footer */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .footer a {
    color: var(--muted);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .footer a:hover { color: var(--text); }

  @media (prefers-reduced-motion: reduce) {
    body::after { animation: none; }
    .auth-btn:hover { transform: none; }
  }
</style>
</head>
