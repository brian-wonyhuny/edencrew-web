<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luum — 모든 프로젝트</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var s=localStorage.getItem('luum-theme');
  var sys=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  var t=(s==='dark'||s==='light')?s:sys;
  if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══ TOKENS ══ */
:root {
  --bg:    #EBEBEB;
  --sur:   #FFFFFF;
  --bdr:   #E9E8E8;
  --bdr2:  #D1D5DB;
  --tx:    #111827;
  --sub:   #6B7280;
  --mu:    #9CA3AF;
  --acc:   #8361FF;
  --acc-f: rgba(131,97,255,0.08);
  --fa:    #F9FAFB;
  --nav-act-bg: #111827;
  --nav-act-tx: #FFFFFF;
  --nav-ho-bg:  #F3F4F6;
}
[data-theme="dark"] {
  --bg:    #09090D;
  --sur:   #111118;
  --bdr:   rgba(255,255,255,0.08);
  --bdr2:  rgba(255,255,255,0.14);
  --tx:    #F0EDE8;
  --sub:   rgba(240,237,232,0.55);
  --mu:    rgba(240,237,232,0.32);
  --fa:    rgba(255,255,255,0.04);
  --nav-act-bg: #8361FF;
  --nav-act-tx: #FFFFFF;
  --nav-ho-bg:  rgba(255,255,255,0.05);
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--tx);
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  display: flex;
  transition: background .2s, color .2s;
}

/* ══ SIDEBAR ══ */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  height: 100vh;
  background: var(--sur);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .22s cubic-bezier(.4,0,.2,1), background .2s, border-color .2s;
  position: relative;
  z-index: 20;
}
.sidebar.col { width: 52px; }

/* workspace header */
.sb-ws {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border-bottom: 1px solid var(--bdr);
  cursor: pointer;
  user-select: none;
  overflow: hidden;
  white-space: nowrap;
  transition: background .12s;
}
.sb-ws:hover { background: var(--nav-ho-bg); }
.ws-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: linear-gradient(135deg,#8361FF,#5B3FD4);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ws-icon svg .uu { fill: #fff; }
.ws-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
.ws-name { font-size: 13px; font-weight: 600; color: var(--tx); overflow: hidden; text-overflow: ellipsis; }
.ws-badge { font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 1px 6px; border-radius: 4px; background: #F3F4F6; color: var(--sub); flex-shrink: 0; }
[data-theme="dark"] .ws-badge { background: rgba(255,255,255,0.08); color: var(--mu); }
.ws-chev { color: var(--mu); flex-shrink: 0; }
.sidebar.col .ws-info { display: none; }
.sidebar.col .ws-chev { display: none; }
.sidebar.col .sb-ws { justify-content: center; padding: 0; }

/* nav */
.sb-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 8px; display: flex; flex-direction: column; gap: 1px; }
.ni {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 7px;
  font-size: 13.5px; font-weight: 400; color: var(--sub);
  cursor: pointer; border: none; background: none; width: 100%;
  text-align: left; font-family: inherit;
  white-space: nowrap; overflow: hidden;
  transition: background .1s, color .1s;
}
.ni:hover { background: var(--nav-ho-bg); color: var(--tx); }
.ni.act { background: var(--nav-act-bg); color: var(--nav-act-tx); }
.sidebar.col .ni { justify-content: center; padding: 9px 0; }
.sidebar.col .ni-lbl, .sidebar.col .ni-n { display: none; }
.ni-ico { width: 15px; height: 15px; flex-shrink: 0; }
.ni-lbl { flex: 1; }
.ni-n { font-size: 10.5px; font-weight: 600; padding: 1px 6px; border-radius: 4px; background: #F3F4F6; color: var(--sub); flex-shrink: 0; }
[data-theme="dark"] .ni-n { background: rgba(255,255,255,0.06); }
.ni.act .ni-n { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.8); }

/* divider */
.sb-div { height: 1px; background: var(--bdr); margin: 6px 0; }
.sb-sec-lbl {
  font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; color: var(--mu);
  padding: 6px 12px 3px;
  white-space: nowrap; overflow: hidden;
}
.sidebar.col .sb-sec-lbl { display: none; }
.sb-empty { font-size: 12px; color: var(--mu); padding: 6px 12px; white-space: nowrap; overflow: hidden; }
.sidebar.col .sb-empty { display: none; }

/* bottom */
.sb-bot { flex-shrink: 0; padding: 8px; border-top: 1px solid var(--bdr); display: flex; flex-direction: column; gap: 4px; }

/* update card */
.sb-update {
  background: var(--fa); border-radius: 8px;
  padding: 10px 11px; display: flex; align-items: flex-start; gap: 8px;
  cursor: pointer; transition: background .12s;
  overflow: hidden;
}
.sb-update:hover { background: var(--bdr); }
.upd-ico { font-size: 18px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.upd-txt { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.upd-title { font-size: 11.5px; font-weight: 600; color: var(--tx); white-space: nowrap; }
.upd-sub { font-size: 10.5px; color: var(--mu); white-space: nowrap; }
.sidebar.col .sb-update { display: none; }

/* update link */
.sb-upd-link {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 4px; font-size: 12px; color: var(--sub);
  cursor: pointer; border-radius: 5px; transition: color .12s;
  white-space: nowrap; overflow: hidden;
}
.sb-upd-link:hover { color: var(--tx); }
.upd-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); flex-shrink: 0; }
.sidebar.col .sb-upd-link { display: none; }

/* user row */
.sb-user {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 4px; border-radius: 7px;
  cursor: pointer; transition: background .12s;
  overflow: hidden; white-space: nowrap;
}
.sb-user:hover { background: var(--nav-ho-bg); }
.u-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg,#8361FF,#5B3FD4);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff;
}
.u-name { font-size: 13px; font-weight: 500; color: var(--tx); }
.sidebar.col .sb-user { justify-content: center; }
.sidebar.col .u-name { display: none; }

/* theme + fold row */
.sb-tf { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 0; gap: 4px; }
.sidebar.col .sb-tf { justify-content: center; }
.th-row { display: flex; gap: 1px; background: #F3F4F6; border-radius: 6px; padding: 2px; }
[data-theme="dark"] .th-row { background: rgba(255,255,255,0.06); }
.tt-btn {
  width: 24px; height: 22px; border: none; background: none; border-radius: 4px;
  cursor: pointer; color: var(--mu); display: flex; align-items: center; justify-content: center;
  transition: background .1s, color .1s;
}
.tt-btn:hover { color: var(--tx); }
.tt-btn.on { background: #FFFFFF; color: var(--tx); box-shadow: 0 1px 2px rgba(0,0,0,.1); }
[data-theme="dark"] .tt-btn.on { background: rgba(255,255,255,0.12); }
.sidebar.col .th-row { display: none; }
.sb-tog {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--bdr);
  background: none; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--mu); transition: background .1s, color .1s; flex-shrink: 0;
}
.sb-tog:hover { background: var(--nav-ho-bg); color: var(--tx); }

/* ══ MAIN ══ */
.main { flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }

.pg-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 28px 16px;
  flex-shrink: 0;
}
.pg-title { font-size: 20px; font-weight: 700; color: var(--tx); letter-spacing: -.03em; }
.pg-acts { display: flex; align-items: center; gap: 8px; }
.btn-new-prj {
  display: flex; align-items: center; gap: 6px;
  height: 34px; padding: 0 14px;
  background: var(--acc); color: #fff;
  border: none; border-radius: 7px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .12s;
}
.btn-new-prj:hover { opacity: .88; }
.btn-del {
  height: 34px; padding: 0 14px;
  background: none; border: 1px solid var(--bdr);
  border-radius: 7px; font-family: inherit; font-size: 13px;
  color: var(--sub); cursor: pointer; transition: border-color .12s, color .12s;
}
.btn-del:hover { border-color: var(--bdr2); color: var(--tx); }

.pg-content { padding: 0 28px 32px; }

/* filter tabs */
.ft-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.ft {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 7px;
  border: 1px solid var(--bdr);
  background: none; color: var(--sub);
  font-size: 13px; font-weight: 400; font-family: inherit;
  cursor: pointer; transition: all .12s;
}
.ft:hover { border-color: var(--bdr2); color: var(--tx); }
.ft.on { background: var(--acc-f); border-color: rgba(131,97,255,.25); color: var(--acc); font-weight: 500; }
.ft-n { font-size: 10.5px; font-weight: 600; background: #F3F4F6; color: var(--mu); padding: 1px 5px; border-radius: 4px; }
[data-theme="dark"] .ft-n { background: rgba(255,255,255,0.06); }
.ft.on .ft-n { background: rgba(131,97,255,.16); color: var(--acc); }

.sec-lbl {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--mu);
  margin: 18px 0 10px;
}
.sec-lbl:first-of-type { margin-top: 0; }

/* project grid */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; margin-bottom: 4px; }

/* project card */
.pc {
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .12s;
}
.pc:hover {
  border-color: rgba(131,97,255,.3);
  box-shadow: 0 4px 20px rgba(0,0,0,.07), 0 1px 6px rgba(0,0,0,.04);
  transform: translateY(-1px);
}

/* card thumbnail */
.pc-thumb {
  height: 140px;
  background: linear-gradient(135deg, #F3F4F6 0%, #E9E8E8 100%);
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.pc-thumb-inner {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  opacity: .5;
}
.pc-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.pc-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pc-tag {
  font-size: 10.5px; font-weight: 500; letter-spacing: .04em;
  padding: 2px 8px; border-radius: 5px; text-transform: uppercase; flex-shrink: 0;
}
.t-dsn { background: rgba(192,38,211,.09); color: #C084FC; }
.t-eng { background: rgba(96,165,250,.1);  color: #60A5FA; }
.t-prd { background: rgba(251,191,36,.1);  color: #F59E0B; }
.t-mkt { background: rgba(52,211,153,.1);  color: #34D399; }
.pc-st { font-size: 11.5px; font-weight: 500; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.s-act  { color: #10B981; }
.s-pro  { color: #60A5FA; }
.s-pln  { color: #F59E0B; }
.s-rev  { color: #8361FF; }
.s-don  { color: var(--mu); }
.pc-name { font-size: 14.5px; font-weight: 600; color: var(--tx); letter-spacing: -.02em; line-height: 1.35; }
.pc-meta { font-size: 12px; color: var(--mu); }
.pbar { height: 3px; background: #F3F4F6; border-radius: 2px; overflow: hidden; }
[data-theme="dark"] .pbar { background: rgba(255,255,255,0.08); }
.pfill { height: 100%; border-radius: 2px; background: var(--acc); transition: width .4s; }
.pfill.done { background: #10B981; }
.pc-bot { display: flex; align-items: center; justify-content: space-between; }
.avs { display: flex; }
.av {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--sur);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: #fff;
  margin-left: -5px; flex-shrink: 0;
}
.av:first-child { margin-left: 0; }
.pct { font-size: 12px; font-weight: 600; color: var(--mu); font-variant-numeric: tabular-nums; }

/* thumb colors per type */
.th-dsn { background: linear-gradient(135deg,rgba(192,38,211,.07),rgba(131,97,255,.07)); }
.th-eng { background: linear-gradient(135deg,rgba(96,165,250,.08),rgba(59,130,246,.06)); }
.th-prd { background: linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.06)); }
.th-mkt { background: linear-gradient(135deg,rgba(52,211,153,.08),rgba(16,185,129,.06)); }

/* Usage card */
.usage-card {
  background: var(--sur); border: 1px solid var(--bdr);
  border-radius: 10px; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 8px;
  cursor: default;
}
.usage-head { display: flex; align-items: center; justify-content: space-between; }
.usage-title { font-size: 13.5px; font-weight: 600; color: var(--tx); }
.usage-count { font-size: 13.5px; font-weight: 700; color: var(--acc); }
.usage-desc { font-size: 12px; color: var(--sub); line-height: 1.6; }
.usage-desc a { color: var(--acc); text-decoration: none; }
.usage-desc a:hover { text-decoration: underline; }
.usage-bar { height: 4px; background: #F3F4F6; border-radius: 2px; overflow: hidden; }
[data-theme="dark"] .usage-bar { background: rgba(255,255,255,0.08); }
.usage-fill { height: 100%; border-radius: 2px; background: var(--acc); }

.pc-fa { opacity: .6; }
.pc-fa:hover { opacity: .85; }
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sb">

  <!-- workspace header -->
  <div class="sb-ws">
    <div class="ws-icon">
      <svg width="12" height="12" viewBox="0 0 51 9" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="uu" fill="#fff" d="M15.922 8.688c-.752 0-1.408-.152-1.968-.456-.56-.312-.996-.74-1.308-1.284C12.334 6.404 12.178 5.78 12.178 5.076V0h2.4v5.292c0 .272.06.504.18.696.12.192.28.34.48.444.208.096.436.144.684.144.256 0 .48-.048.672-.144.2-.096.356-.24.468-.424.112-.192.168-.424.168-.692V0h2.412v5.088c0 .704-.156 1.328-.468 1.872-.304.536-.736.96-1.296 1.272-.552.304-1.204.456-1.956.456Z"/>
        <path class="uu" fill="#fff" d="M30.249 8.688c-.752 0-1.408-.152-1.968-.456-.56-.312-.996-.74-1.308-1.284-.312-.544-.468-1.168-.468-1.872V0h2.4v5.292c0 .272.06.504.18.696.12.192.28.34.48.444.208.096.436.144.684.144.256 0 .48-.048.672-.144.2-.096.356-.24.468-.424.112-.192.168-.424.168-.692V0h2.412v5.088c0 .704-.156 1.328-.468 1.872-.304.536-.736.96-1.296 1.272-.552.304-1.204.456-1.956.456Z"/>
      </svg>
    </div>
    <div class="ws-info">
      <span class="ws-name">Edencrew</span>
      <span class="ws-badge">STARTER</span>
    </div>
    <svg class="ws-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <!-- nav items -->
  <nav class="sb-nav">
    <button class="ni">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="ni-lbl">홈</span>
    </button>
    <button class="ni act">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      <span class="ni-lbl">모든 프로젝트</span>
    </button>
    <button class="ni">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      <span class="ni-lbl">휴지통</span>
    </button>
    <button class="ni">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
      <span class="ni-lbl">관리자</span>
    </button>
    <button class="ni">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span class="ni-lbl">플랜 및 결제</span>
    </button>
    <button class="ni">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="ni-lbl">알림함</span>
    </button>

    <div class="sb-div"></div>
    <div class="sb-sec-lbl">즐겨찾기</div>
    <div class="sb-empty">즐겨찾기한 프로젝트가 없습니다.</div>
  </nav>

  <!-- bottom -->
  <div class="sb-bot">
    <div class="sb-update">
      <div class="upd-ico">🐢</div>
      <div class="upd-txt">
        <div class="upd-title">새 업데이트가 있어요!</div>
        <div class="upd-sub">새로운 기능을 확인하세요</div>
      </div>
    </div>
    <div class="sb-upd-link">
      <div class="upd-dot"></div>
      <span>업데이트 &amp; 패치 노트</span>
    </div>
    <div class="sb-div" style="margin:2px 0;"></div>
    <div class="sb-user">
      <div class="u-av">B</div>
      <span class="u-name">Brian</span>
    </div>
    <div class="sb-tf">
      <div class="th-row">
        <button class="tt-btn" data-tt="light" title="라이트" onclick="applyTheme('light')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button class="tt-btn" data-tt="system" title="시스템" onclick="applyTheme('system')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>
        <button class="tt-btn" data-tt="dark" title="다크" onclick="applyTheme('dark')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <button class="sb-tog" id="sbtog" onclick="toggleSB()" title="사이드바 접기">

<script>
function applyTheme(p) {
  var mq = window.matchMedia('(prefers-color-scheme: dark)');
  var r = p === 'system' ? (mq.matches ? 'dark' : 'light') : p;
  if (r === 'dark') document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
  if (p === 'system') localStorage.removeItem('luum-theme');
  else localStorage.setItem('luum-theme', p);
  document.querySelectorAll('.tt-btn').forEach(function(b) {
    b.classList.toggle('on', b.dataset.tt === p);
  });
}

function toggleSB() {
  var sb = document.getElementById('sb');
  var col = sb.classList.toggle('col');
  localStorage.setItem('luum-sb', col ? '1' : '0');
  var poly = document.getElementById('sbchv').querySelector('polyline');
  poly.setAttribute('points', col ? '9 18 15 12 9 6' : '15 18 9 12 15 6');
}

function goToProject() { location.href = 'project-dashboard.html'; }

function setFilter(el, s) {
  document.querySelectorAll('.ft').forEach(function(b) { b.classList.remove('on'); });
  el.classList.add('on');
  document.querySelectorAll('.pc').forEach(function(c) {
    if (!c.dataset.s) return;
    c.style.display = (s === 'all' || c.dataset.s === s) ? '' : 'none';
  });
}

/* init */
(function() {
  var s = localStorage.getItem('luum-theme');
  var mode = (s === 'light' || s === 'dark') ? s : 'system';
  document.querySelectorAll('.tt-btn').forEach(function(b) {
    b.classList.toggle('on', b.dataset.tt === mode);
  });
  if (localStorage.getItem('luum-sb') === '1') {
    var sb = document.getElementById('sb');
    sb.classList.add('col');
    var poly = document.getElementById('sbchv').querySelector('polyline');
    poly.setAttribute('points','9 18 15 12 9 6');
  }
})();
</script>
